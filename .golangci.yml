run:
  timeout: 5m

linters:
  enable:
    - errcheck
    - govet
    - staticcheck
    - ineffassign
    - unused
    - gosec
    - revive
    - misspell

issues:
  exclude-rules:
    # Test files may ignore some errcheck/gosec noise (e.g. fixture setup).
    - path: _test\.go
      linters:
        - gosec
        - errcheck
